taxonomies:
    tag: tags
params:
    description: "Nikita Obraztsov — sociologist of religion, computational social scientist. Research on secularization, religious networks, and agent-based modeling."
    author: Nikita Obraztsov
    DateFormat: "January 2006"
    defaultTheme: light
    hideFooter: false
    disableThemeToggle: true
    ShowShareButtons: false
    ShowReadingTime: false
    disableSpecial1stPost: true
    disableAnchoredHeadings: true
    ShowPostNavLinks: false
    ShowBreadCrumbs: false
    ShowCodeCopyButtons: true
    ShowAllPagesInArchive: false
    MainSections: ["publications","talks","notes","news"]
    ShowToc: false
    disableScrollToTop: true
    TocOpen: true
    ShowWordCount: false
    UseHugoToc: true
    comments: false
    math: true
    profileMode:
          enabled: true
          title: Nikita Obraztsov
          subtitle: "I am a master's student in Computational Sociology at the European University at St. Petersburg. My research focuses on religious network topology, secularization, and agent-based modeling. I also lecture on world religions and the sociology of religion for general audiences."
          imageUrl: "picture.jpeg"
          imageWidth: 160
          imageHeight: 160
          buttons:
            - name: Publications
              url: publications/
            - name: Talks
              url: talks/
            - name: Notes
              url: notes/
            - name: News
              url: news/
            - name: Contact
              url: contact/

    socialIcons:
        - name: CV
          url: cv.pdf
        - name: Email
          url: mailto:nikobrazets@gmail.com
        - name: Google Scholar
          url: https://scholar.google.com/
        - name: GitHub
          url: https://github.com/nobraztsov
        - name: YouTube
          url: https://www.youtube.com/@ON_religio
        - name: LinkedIn
          url: https://www.linkedin.com/in/nikobraztsov/
        - name: Telegram
          url: https://t.me/nikitaobraztsov

